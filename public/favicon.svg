<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="kk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="neon-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Dark premium background -->
  <rect width="512" height="512" rx="128" fill="#06070b" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  
  <!-- Outer circular aperture shutter ring -->
  <circle cx="256" cy="256" r="160" stroke="url(#kk-grad)" stroke-width="12" stroke-dasharray="24 16" opacity="0.3" />
  <circle cx="256" cy="256" r="130" stroke="url(#kk-grad)" stroke-width="4" stroke-dasharray="8 8" opacity="0.5" />
  
  <!-- Sleek Glowing Lightning Bolt -->
  <path d="M290 80 L160 270 L260 270 L220 430 L350 240 L250 240 Z" fill="url(#kk-grad)" filter="url(#neon-cyan)" />
</svg>
