<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="kk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="neon-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Dark premium background -->
  <rect width="512" height="512" rx="128" fill="#06070b" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
  
  <!-- Outer decorative tech lines -->
  <circle cx="256" cy="256" r="180" stroke="url(#kk-grad)" stroke-width="4" stroke-dasharray="12 24" opacity="0.25" />
  <circle cx="256" cy="256" r="140" stroke="url(#kk-grad)" stroke-width="2" stroke-dasharray="4 8" opacity="0.4" />
  
  <!-- Cyber Electric Letter K Logo -->
  <g filter="url(#neon-cyan)">
    <!-- Vertical Data Stem -->
    <rect x="140" y="100" width="32" height="312" rx="16" fill="url(#kk-grad)" />
    
    <!-- Upper Lightning Arm (forming K top) -->
    <path d="M166 230 L320 100 L250 250 Z" fill="url(#kk-grad)" />
    
    <!-- Lower Lightning Arm (forming K bottom & lightning tail) -->
    <path d="M166 230 L220 280 L180 412 L340 240 Z" fill="url(#kk-grad)" />
    
    <!-- Connecting glowing energy bolt -->
    <path d="M160 210 L300 210 L220 290 L320 290 L160 412 L220 290 Z" fill="#ffffff" opacity="0.15" />
  </g>
  
  <!-- Glowing circular energy nodes -->
  <circle cx="320" cy="100" r="10" fill="#ffffff" filter="url(#neon-cyan)" />
  <circle cx="180" cy="412" r="10" fill="#ffffff" filter="url(#neon-cyan)" />
</svg>
